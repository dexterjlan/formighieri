<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formighieri - Sistema de Comunicação de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- 1. TELA DE LOGIN -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
            <div class="text-center mb-6">
                <div
                    class="inline-block bg-slate-900 text-amber-500 p-3 rounded-xl font-bold text-2xl tracking-wider mb-2">
                    F</div>
                <h2 class="text-xl font-bold text-slate-900">FORMIGHIERI MÓVEIS</h2>
                <p class="text-xs text-slate-400 mt-1">Conecte-se para acessar o painel integrado</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">E-mail</label>
                    <input type="email" id="login-email"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-amber-600"
                        required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Senha</label>
                    <input type="password" id="login-password"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-amber-600"
                        required>
                </div>
                <button type="submit"
                    class="w-full bg-slate-900 text-white py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">Entrar
                    no Sistema</button>
            </form>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (Oculto antes do login) -->
    <div id="main-panel" class="hidden flex flex-col flex-1">
        <header class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
            <div>
                <h1 class="text-lg font-bold tracking-tight">FORMIGHIERI</h1>
                <p class="text-xs text-slate-400" id="user-display">Usuário: -</p>
            </div>
            <button onclick="logout()"
                class="text-xs bg-slate-800 text-slate-400 hover:text-white px-3 py-1.5 rounded-lg">Sair</button>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- 2. TELA / COLUNA DE PEDIDOS -->
            <section
                class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-140px)]">
                <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                    <h2 class="font-bold text-sm text-slate-900">Pedidos de Venda</h2>
                    <button onclick="toggleModal('order-modal', true)"
                        class="bg-amber-600 text-white text-xs px-2.5 py-1 rounded-md font-semibold hover:bg-amber-700">+
                        Novo Pedido</button>
                </div>
                <div class="overflow-y-auto flex-1 divide-y divide-slate-100" id="orders-list"></div>
            </section>

            <!-- 3. TELA DE DETALHES E CONVERSAS -->
            <section class="lg:col-span-2 flex flex-col h-[calc(100vh-140px)] overflow-y-auto" id="detail-section">
                <div id="empty-state"
                    class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center flex flex-col items-center justify-center h-full text-slate-400">
                    <p class="text-sm font-medium">Selecione um pedido para gerenciar as conversas técnicas.</p>
                </div>

                <div id="order-content" class="hidden flex flex-col gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span
                                        class="text-xs font-bold bg-slate-900 text-amber-500 px-2 py-0.5 rounded font-mono"
                                        id="det-code">#PV</span>
                                    <h3 class="text-lg font-bold text-slate-900" id="det-client">Cliente</h3>
                                </div>
                                <p class="text-xs text-slate-400 mt-1" id="det-info">Consultor: - | Criado por: -</p>
                            </div>
                            <button onclick="toggleModal('conv-modal', true)"
                                class="bg-slate-900 text-white text-xs px-3 py-1.5 rounded-lg font-medium hover:bg-slate-800">+
                                Abrir Nova Conversa</button>
                        </div>
                    </div>

                    <!-- Lista de Conversas do Pedido -->
                    <div class="space-y-4" id="conversations-list"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: CRIAR PEDIDO -->
    <div id="order-modal"
        class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
            <h3 class="font-bold text-base text-slate-900 mb-4">Criar Novo Pedido de Venda</h3>
            <form id="order-form" class="space-y-3">
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Código do Pedido (Ex:
                        PV-4050)</label><input type="text" id="ord-code"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none" required>
                </div>
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Nome do Cliente</label><input
                        type="text" id="ord-client"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none" required>
                </div>
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Nome do Consultor</label><input
                        type="text" id="ord-consultant"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none" required>
                </div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="toggleModal('order-modal', false)"
                        class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-medium">Cancelar</button><button
                        type="submit" class="flex-1 bg-amber-600 text-white py-2 rounded-lg text-xs font-medium">Salvar
                        Pedido</button></div>
            </form>
        </div>
    </div>

    <!-- MODAL: CRIAR CONVERSA -->
    <div id="conv-modal"
        class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl">
            <h3 class="font-bold text-base text-slate-900 mb-4">Nova Conversa / Solicitação Técnica</h3>
            <form id="conv-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Selecione o Projetista</label>
                    <select id="conv-designer"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none"
                        required></select>
                </div>
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Solicitação do
                        Projetista</label><textarea id="conv-request" rows="3"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none"
                        required></textarea></div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="toggleModal('conv-modal', false)"
                        class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-medium">Cancelar</button><button
                        type="submit" class="flex-1 bg-slate-900 text-white py-2 rounded-lg text-xs font-medium">Iniciar
                        Conversa</button></div>
            </form>
        </div>
    </div>

    <script>
        // ⚠️ ATENÇÃO: COLOQUE SEUS DADOS DO SUPABASE AQUI
        const SUPABASE_URL = "https://phpcrboxtduethlqvkot.supabase.co";
        const SUPABASE_KEY = "sb_publishable_x1-G_DEEt_PxLwRou-J3dg_KKuFwEj-";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;
        let activeOrderId = null;

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        document.getElementById("login-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value;
            const pass = document.getElementById("login-password").value;

            const { data: user, error } = await supabase
                .from('appUsers')
                .select('*')
                .eq('email', email)
                .single();

            if (error || !user || pass !== user.passwordHash) {
                alert("Usuário ou senha inválidos.");
                return;
            }

            currentUser = user;
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-panel").classList.remove("hidden");
            document.getElementById("user-display").innerText = `Logado como: ${user.name} (${user.role})`;
            initApp();
        });

        function logout() {
            location.reload();
        }

        function initApp() {
            loadOrders();
            loadDesigners();
        }

        async function loadOrders() {
            const { data: orders, error } = await supabase
                .from('salesOrders')
                .select('*')
                .order('createdAt', { ascending: false });

            const list = document.getElementById("orders-list");
            list.innerHTML = "";

            if (error || !orders) return;

            orders.forEach(o => {
                const isSelected = o.id === activeOrderId;
                const div = document.createElement("div");
                div.className = `p-4 cursor-pointer hover:bg-slate-50 transition flex flex-col gap-1 ${isSelected ? 'bg-amber-50/60 border-l-4 border-amber-600' : ''}`;
                div.onclick = () => selectOrder(o.id);
                div.innerHTML = `
                    <div class="text-xs font-mono font-bold text-slate-400">${o.orderCode}</div>
                    <div class="text-sm font-bold text-slate-900">${o.clientName}</div>
                    <div class="text-xs text-slate-500">Consultor: ${o.consultantName}</div>
                `;
                list.appendChild(div);
            });
        }

        async function loadDesigners() {
            const { data: designers, error } = await supabase
                .from('designers')
                .select('*')
                .eq('isActive', true);

            const select = document.getElementById("conv-designer");
            select.innerHTML = '<option value="">Selecione...</option>';

            if (error || !designers) return;

            designers.forEach(d => {
                select.innerHTML += `<option value="${d.id}">${d.name}</option>`;
            });
        }

        async function selectOrder(id) {
            activeOrderId = id;
            document.getElementById("empty-state").classList.add("hidden");
            document.getElementById("order-content").classList.remove("hidden");

            const { data: order, error } = await supabase
                .from('salesOrders')
                .select('*, creator:appUsers!salesOrders_createdById_fkey(name)')
                .eq('id', id)
                .single();

            if (error || !order) return;

            document.getElementById("det-code").innerText = order.orderCode;
            document.getElementById("det-client").innerText = order.clientName;
            document.getElementById("det-info").innerText =
                `Consultor: ${order.consultantName} | Criado por: ${order.creator?.name || 'Sistema'}`;

            loadOrders();
            loadConversations(id);
        }

        async function loadConversations(orderId) {
            const { data: convs, error } = await supabase
                .from('orderConversations')
                .select('*, designer:designers(name)')
                .eq('orderId', orderId)
                .order('createdAt', { ascending: true });

            const list = document.getElementById("conversations-list");

            if (error || !convs || convs.length === 0) {
                list.innerHTML = '<p class="text-xs text-slate-400 text-center py-6 bg-white rounded-xl border border-slate-200 shadow-sm">Nenhuma conversa técnica aberta para este pedido.</p>';
                return;
            }

            list.innerHTML = "";

            convs.forEach(c => {
                const isOpen = c.status === 'Aberto';
                const div = document.createElement("div");
                div.className = "bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-3";

                let responseSection;
                if (c.commercialResponse) {
                    responseSection = `
                        <div class="bg-emerald-50 p-3 rounded-lg text-xs">
                            <p class="font-bold text-emerald-600 uppercase text-[9px] mb-1">Resposta do Comercial:</p>
                            <p class="text-slate-800 font-medium">${c.commercialResponse}</p>
                        </div>
                    `;
                } else if (isOpen && currentUser.role === 'Comercial') {
                    responseSection = `
                        <div class="space-y-2">
                            <textarea id="reply-${c.id}" rows="2"
                                class="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:border-amber-600"
                                placeholder="Digite a resposta do comercial..."></textarea>
                            <button type="button" onclick="replyConversation('${c.id}')"
                                class="bg-amber-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium hover:bg-amber-700">
                                Responder e Encerrar
                            </button>
                        </div>
                    `;
                } else {
                    responseSection = '<p class="text-xs text-slate-400 italic">Aguardando retorno do setor comercial...</p>';
                }

                div.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                        <div class="text-xs font-bold text-slate-700">👤 Projetista: ${c.designer?.name || '-'}</div>
                        <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase ${isOpen ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-600'}">${c.status}</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-lg text-xs">
                        <p class="font-bold text-slate-400 uppercase text-[9px] mb-1">Solicitação Técnica:</p>
                        <p class="text-slate-800 font-medium">${c.designerRequest}</p>
                    </div>
                    ${responseSection}
                `;
                list.appendChild(div);
            });
        }

        document.getElementById("order-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const payload = {
                orderCode: document.getElementById("ord-code").value,
                clientName: document.getElementById("ord-client").value,
                consultantName: document.getElementById("ord-consultant").value,
                createdById: currentUser.id,
                updatedById: currentUser.id
            };

            await supabase.from('salesOrders').insert([payload]);
            toggleModal('order-modal', false);
            document.getElementById("order-form").reset();
            loadOrders();
        });

        document.getElementById("conv-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const payload = {
                orderId: activeOrderId,
                designerId: document.getElementById("conv-designer").value,
                designerRequest: document.getElementById("conv-request").value,
                status: 'Aberto',
                createdById: currentUser.id,
                updatedById: currentUser.id
            };

            await supabase.from('orderConversations').insert([payload]);
            toggleModal('conv-modal', false);
            document.getElementById("conv-form").reset();
            loadConversations(activeOrderId);
        });

        async function replyConversation(id) {
            const input = document.getElementById(`reply-${id}`);
            if (!input || !input.value.trim()) return;

            await supabase
                .from('orderConversations')
                .update({
                    commercialResponse: input.value.trim(),
                    status: 'Encerrado',
                    updatedAt: new Date().toISOString(),
                    updatedById: currentUser.id
                })
                .eq('id', id);

            loadConversations(activeOrderId);
        }
    </script>
</body>

</html>
