    <!-- 1. TELA DE LOGIN -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
            <div class="mb-6">
                <div class="fgp-brand fgp-brand--auth">
                    <img src="images/fgp_logo.png" alt="FGP - Formighieri Gestão de Processo" class="fgp-brand__logo">
                </div>
                <p class="text-xs text-slate-400 mt-5 text-center">Conecte-se para acessar o painel</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">E-mail</label>
                    <input type="email" id="login-email"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-amber-600"
                        required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Senha</label>
                    <input type="password" id="login-password"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:border-amber-600"
                        required>
                </div>
                <button type="submit" id="btn-login-submit"
                    class="w-full bg-slate-900 text-white py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition disabled:opacity-60">Entrar
                    no FGP</button>
            </form>
            <p class="text-center text-xs text-slate-400 mt-4">
                Não tem conta?
                <button type="button" id="btn-show-register"
                    class="text-amber-600 font-semibold hover:text-amber-700">Criar usuário</button>
            </p>
        </div>
    </div>
