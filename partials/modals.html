    <!-- MODAL: CRIAR PEDIDO -->
    <div id="order-modal"
        class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
            <h3 class="font-bold text-base text-slate-900 mb-4">Criar Novo Pedido de Venda</h3>
            <form id="order-form" class="space-y-3">
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Código do Pedido (somente
                        números) <span class="text-red-500">*</span></label><input type="text" id="ord-code" inputmode="numeric" pattern="[0-9]*"
                        maxlength="20"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none" required>
                </div>
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Nome do Cliente <span class="text-red-500">*</span></label><input
                        type="text" id="ord-client"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Consultor <span class="text-red-500">*</span></label>
                    <select id="ord-consultant"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none"
                        required></select>
                </div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="toggleModal('order-modal', false)"
                        class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-medium">Cancelar</button><button
                        type="submit" class="flex-1 bg-amber-600 text-white py-2 rounded-lg text-xs font-medium">Salvar
                        Pedido</button></div>
            </form>
        </div>
    </div>

    <!-- MODAL: CRIAR CONVERSA -->
    <div id="conv-modal"
        class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl">
            <h3 id="conv-modal-title" class="font-bold text-base text-slate-900 mb-4">Nova Conversa / Solicitação Técnica</h3>
            <form id="conv-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Selecione o Projetista</label>
                    <select id="conv-designer"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none"
                        required></select>
                </div>
                <div><label class="block text-xs font-semibold text-slate-500 mb-1">Solicitação do
                        Projetista</label><textarea id="conv-request" rows="3"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none"
                        required></textarea></div>
                <div id="conv-response-wrap" class="hidden">
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Resposta do Consultor</label>
                    <textarea id="conv-response" rows="3"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none"
                        placeholder="Digite a resposta do consultor..."></textarea>
                    <div class="mt-2" id="conv-response-date-wrap">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Data da resposta</label>
                        <p id="conv-response-date-display"
                            class="w-full px-3 py-2 text-sm border border-slate-100 rounded-lg bg-slate-50 text-slate-600">
                            —
                        </p>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">Ao salvar com resposta preenchida, a conversa será encerrada.</p>
                </div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="closeConvModal()"
                        class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-medium">Cancelar</button><button
                        type="submit" id="conv-form-submit"
                        class="flex-1 bg-slate-900 text-white py-2 rounded-lg text-xs font-medium">Iniciar
                        Conversa</button></div>
            </form>
        </div>
    </div>
